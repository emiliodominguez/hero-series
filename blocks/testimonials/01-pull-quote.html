<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pull Quote</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,400;1,500&family=Hanken+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #f1ece0; --ink: #14110a; --ink-soft: #5a554a; --accent: #b03a1e; --rule: rgba(20, 17, 10, 0.18); }
body { background: var(--bg); color: var(--ink); font-family: "Hanken Grotesk", system-ui, sans-serif; min-height: 100svh; padding: clamp(40px, 6vw, 96px); display: flex; flex-direction: column; justify-content: center; max-width: 980px; margin: 0 auto; gap: clamp(40px, 5vh, 64px); }
.eyebrow { display: inline-flex; align-items: center; gap: 12px; font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-soft); }
.eyebrow::before { content: ""; width: 24px; height: 1px; background: var(--accent); }
.quote { font-family: "Cormorant Garamond", serif; font-style: italic; font-weight: 500; font-size: clamp(36px, 5.5vw, 72px); line-height: 1.15; letter-spacing: -0.02em; }
.quote::before { content: "\201C"; color: var(--accent); margin-right: 4px; }
.quote::after { content: "\201D"; color: var(--accent); }
.quote em { color: var(--accent); font-weight: 500; }
.byline { display: flex; align-items: center; gap: 14px; padding-top: 24px; border-top: 1px solid var(--rule); }
.avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #d4a04a); }
.who { display: flex; flex-direction: column; gap: 2px; }
.name { font-weight: 700; font-size: 14px; letter-spacing: -0.01em; }
.role { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-soft); }
.cite { margin-left: auto; font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-soft); }
@media (max-width: 720px) { .cite { display: none; } }
</style>
</head>
<body>
<p class="eyebrow">testimonial / 04</p>
<blockquote class="quote">Working with the studio felt like watching a craftsman <em>set type by hand</em> — every detail considered, every decision earned. Our product finally feels like it has a voice.</blockquote>
<div class="byline">
  <span class="avatar"></span>
  <div class="who">
    <span class="name">Mara Lindqvist</span>
    <span class="role">Head of Brand · Studio Halo</span>
  </div>
  <span class="cite">★★★★★ — verified client</span>
</div>
</body>
</html>
