<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Big Type CTA</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;800;900&family=Newsreader:ital,opsz,wght@1,6..72,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #0e0e10; --ink: #f4f0e8; --ink-soft: #807a70; --accent: #ff5a3d; --rule: rgba(244, 240, 232, 0.14); }
body { background: var(--bg); color: var(--ink); font-family: "Hanken Grotesk", system-ui, sans-serif; min-height: 100svh; padding: clamp(28px, 4vw, 64px); display: flex; flex-direction: column; justify-content: center; align-items: center; gap: clamp(28px, 4vh, 56px); text-align: center; position: relative; overflow: hidden; }
body::before { content: ""; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 40% at 50% 50%, color-mix(in srgb, var(--accent) 18%, transparent), transparent 70%); pointer-events: none; }
.eyebrow { position: relative; font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-soft); display: inline-flex; align-items: center; gap: 10px; }
.eyebrow::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 1.6s infinite; }
@keyframes pulse { 50% { opacity: 0.4; } }
.title { position: relative; font-weight: 900; font-size: clamp(72px, 12vw, 200px); line-height: 0.85; letter-spacing: -0.05em; max-width: 1200px; }
.title em { font-family: "Newsreader", serif; font-style: italic; font-weight: 400; color: var(--accent); }
.dek { position: relative; max-width: 560px; color: var(--ink-soft); font-size: 16px; line-height: 1.55; }
.actions { position: relative; display: inline-flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.cta { display: inline-flex; align-items: center; gap: 10px; padding: 16px 28px; border-radius: 999px; background: var(--accent); color: var(--bg); font-weight: 700; font-size: 14px; text-decoration: none; letter-spacing: 0.04em; transition: transform 0.3s cubic-bezier(0.65, 0, 0.35, 1); }
.cta:hover { transform: translateY(-2px); }
.cta.ghost { background: transparent; color: var(--ink); border: 1px solid var(--rule); }
.cta.ghost:hover { background: var(--ink); color: var(--bg); }
@media (max-width: 720px) { .title { font-size: 56px; } }
</style>
</head>
<body>
<p class="eyebrow">/ ready when you are</p>
<h1 class="title">let's <em>build</em> something good.</h1>
<p class="dek">Open for select projects this quarter. Brand systems, editorial sites, kinetic interfaces — the kind that take a beat to read and a long time to forget.</p>
<div class="actions">
  <a class="cta" href="#">start a project →</a>
  <a class="cta ghost" href="#">see recent work</a>
</div>
</body>
</html>
