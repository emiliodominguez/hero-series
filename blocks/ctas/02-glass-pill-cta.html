<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Glass Pill CTA</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;700;800&display=swap" rel="stylesheet" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #0a0418; --accent: #b86aff; --accent-cool: #5af0ff; --ink: #f4eeff; --ink-soft: #c8b8e0; --glass: rgba(255, 255, 255, 0.08); --border: rgba(255, 255, 255, 0.18); }
body { background: var(--bg); color: var(--ink); font-family: "Hanken Grotesk", system-ui, sans-serif; min-height: 100svh; padding: clamp(28px, 4vw, 56px); display: grid; place-items: center; position: relative; overflow: hidden; }
.orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.65; pointer-events: none; }
.orb-a { width: 50vw; height: 50vw; max: 600px; left: -10%; top: -10%; background: var(--accent); }
.orb-b { width: 40vw; height: 40vw; max: 500px; right: -8%; bottom: -10%; background: var(--accent-cool); opacity: 0.45; }
.card { position: relative; width: min(720px, 100%); padding: clamp(36px, 5vw, 56px); border-radius: 28px; background: var(--glass); border: 1px solid var(--border); backdrop-filter: blur(24px) saturate(140%); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.4); display: flex; flex-direction: column; gap: 20px; text-align: center; align-items: center; }
.label { display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 999px; background: rgba(255, 255, 255, 0.1); border: 1px solid var(--border); font-size: 12px; font-weight: 500; }
.label::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: #2eff7a; box-shadow: 0 0 8px #2eff7a; }
.title { font-weight: 800; font-size: clamp(40px, 5.5vw, 64px); line-height: 1; letter-spacing: -0.04em; max-width: 460px; }
.dek { color: var(--ink-soft); font-size: 15px; line-height: 1.55; max-width: 420px; }
.actions { display: inline-flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.cta { padding: 14px 26px; border-radius: 999px; background: var(--ink); color: var(--bg); font-weight: 700; font-size: 13px; letter-spacing: 0.04em; text-decoration: none; transition: transform 0.3s; border: 1px solid var(--border); display: inline-flex; align-items: center; gap: 8px; }
.cta:hover { transform: translateY(-2px); background: var(--accent); color: var(--ink); }
.cta.ghost { background: rgba(255, 255, 255, 0.08); color: var(--ink); }
.cta.ghost:hover { background: rgba(255, 255, 255, 0.18); }
</style>
</head>
<body>
<span class="orb orb-a"></span><span class="orb orb-b"></span>
<div class="card">
  <span class="label">currently online</span>
  <h2 class="title">your idea, our pixels.</h2>
  <p class="dek">Tell us about the project. We'll send back a thoughtful first take within 48 hours — no pitch decks.</p>
  <div class="actions">
    <a class="cta" href="#">start a brief →</a>
    <a class="cta ghost" href="#">book a 15-min call</a>
  </div>
</div>
</body>
</html>
