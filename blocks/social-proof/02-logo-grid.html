<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Logo Grid</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;700;800&family=Newsreader:ital,opsz,wght@1,6..72,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #f4efe6; --ink: #14110a; --ink-soft: #5a554a; --accent: #b03a1e; --rule: rgba(20, 17, 10, 0.18); }
body { background: var(--bg); color: var(--ink); font-family: "Hanken Grotesk", system-ui, sans-serif; min-height: 100svh; padding: clamp(40px, 5vw, 64px) clamp(20px, 4vw, 56px); display: flex; flex-direction: column; gap: clamp(32px, 5vh, 56px); max-width: 1240px; margin: 0 auto; justify-content: center; }
.head { display: flex; justify-content: space-between; align-items: end; gap: 24px; flex-wrap: wrap; }
.eyebrow { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); font-weight: 700; }
.title { font-weight: 800; font-size: clamp(36px, 5vw, 56px); line-height: 1.05; letter-spacing: -0.04em; max-width: 520px; }
.title em { font-family: "Newsreader", serif; font-style: italic; font-weight: 400; color: var(--accent); }
.right { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-soft); }
.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0; border-top: 1px solid var(--rule); border-left: 1px solid var(--rule); }
.cell { display: flex; align-items: center; justify-content: center; padding: 36px; border-bottom: 1px solid var(--rule); border-right: 1px solid var(--rule); aspect-ratio: 16/9; transition: background 0.2s; cursor: default; }
.cell:hover { background: rgba(20, 17, 10, 0.04); }
.logo { display: inline-flex; align-items: center; gap: 8px; font-weight: 700; font-size: clamp(18px, 2vw, 22px); letter-spacing: -0.02em; color: var(--ink); }
.logo span:first-child { font-size: 1.2em; color: var(--accent); }
.logo.italic { font-family: "Newsreader", serif; font-style: italic; font-weight: 400; font-size: 24px; }
@media (max-width: 720px) { .grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
<header class="head">
  <div><p class="eyebrow">/ ten teams</p><h2 class="title">people who <em>let me</em> show up.</h2></div>
  <span class="right">est. 2018 — present</span>
</header>
<div class="grid">
  <div class="cell"><span class="logo"><span>◆</span>Halo Labs</span></div>
  <div class="cell"><span class="logo italic">Periodical</span></div>
  <div class="cell"><span class="logo"><span>★</span>Northstar</span></div>
  <div class="cell"><span class="logo"><span>●</span>Kettle &amp; Co</span></div>
  <div class="cell"><span class="logo italic">Atelier 04</span></div>
  <div class="cell"><span class="logo"><span>◇</span>Folio</span></div>
  <div class="cell"><span class="logo"><span>▲</span>Studio Halo</span></div>
  <div class="cell"><span class="logo italic">Soft Press</span></div>
  <div class="cell"><span class="logo"><span>◐</span>Tempor</span></div>
  <div class="cell"><span class="logo italic">Quartet</span></div>
</div>
</body>
</html>
