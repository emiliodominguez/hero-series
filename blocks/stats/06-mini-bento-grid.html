<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mini Bento</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;700;800;900&family=Newsreader:ital,opsz,wght@1,6..72,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #f4efe6; --ink: #14110a; --ink-soft: #5a554a; --accent: #b03a1e; --rule: rgba(20, 17, 10, 0.16); --surface: #ffffff; }
body { background: var(--bg); color: var(--ink); font-family: "Hanken Grotesk", system-ui, sans-serif; min-height: 100svh; padding: clamp(28px, 4vw, 56px); max-width: 880px; margin: 0 auto; display: grid; grid-template-rows: auto 1fr; gap: 28px; }
h1 { font-weight: 800; font-size: 28px; letter-spacing: -0.02em; }
.bento { display: grid; grid-template-columns: 2fr 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 12px; min-height: 460px; }
.cell { background: var(--surface); border: 1px solid var(--rule); border-radius: 14px; padding: 18px; display: flex; flex-direction: column; gap: 8px; }
.cell-large { grid-row: span 2; padding: 24px; background: var(--ink); color: var(--bg); border-color: var(--ink); }
.cell-large .label { color: rgba(244, 239, 230, 0.6); }
.cell-accent { background: var(--accent); color: white; border-color: var(--accent); }
.cell-accent .label { color: rgba(255, 255, 255, 0.7); }
.label { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-soft); }
.head-line { font-weight: 800; font-size: 16px; letter-spacing: -0.01em; line-height: 1.2; }
.cell-large .head-line { font-size: 26px; }
.cell-large .head-line em { font-family: "Newsreader", serif; font-style: italic; font-weight: 400; color: var(--accent); }
.body { font-size: 12px; line-height: 1.5; opacity: 0.78; }
.big-num { font-weight: 900; font-size: 56px; line-height: 1; letter-spacing: -0.04em; margin-top: auto; font-variant-numeric: tabular-nums; }
.big-num em { font-family: "Newsreader", serif; font-style: italic; font-weight: 400; }
.spark { display: flex; gap: 2px; align-items: end; height: 50px; margin-top: auto; }
.spark span { flex: 1; background: currentColor; opacity: 0.3; border-radius: 2px; }
.spark span:nth-last-child(-n+2) { opacity: 0.85; }
@media (max-width: 720px) { .bento { grid-template-columns: 1fr 1fr; } .cell-large { grid-row: span 1; } }
</style>
</head>
<body>
<h1>Compact bento — 5 cells</h1>
<div class="bento">
  <div class="cell cell-large"><span class="label">Headline metric</span><h3 class="head-line">a quarter <em>well-spent</em>.</h3><p class="body">All four 2026 slots booked, 12 essays shipped, 2 talks given.</p><div class="big-num">042<em>+</em></div></div>
  <div class="cell"><span class="label">NPS</span><div class="big-num" style="color: var(--accent)">9.6</div></div>
  <div class="cell cell-accent"><span class="label">+ this week</span><div class="big-num">+412</div></div>
  <div class="cell"><span class="label">Trend · 8 weeks</span><div class="spark" style="color: var(--accent)"><span style="height:30%"></span><span style="height:50%"></span><span style="height:40%"></span><span style="height:70%"></span><span style="height:55%"></span><span style="height:80%"></span><span style="height:75%"></span><span style="height:95%"></span></div></div>
  <div class="cell"><span class="label">Streak</span><div class="big-num">28<em style="font-size:18px">d</em></div></div>
</div>
</body>
</html>
