<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Product Card</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;700;800&family=Newsreader:ital,opsz,wght@1,6..72,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #f4efe6; --ink: #14110a; --ink-soft: #5a554a; --accent: #b03a1e; --rule: rgba(20, 17, 10, 0.14); --surface: #ffffff; }
body { background: var(--bg); color: var(--ink); font-family: "Hanken Grotesk", system-ui, sans-serif; min-height: 100svh; padding: clamp(28px, 4vw, 56px); display: grid; place-items: center; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; max-width: 1100px; width: 100%; }
.card { background: var(--surface); border: 1px solid var(--rule); border-radius: 16px; overflow: hidden; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; display: flex; flex-direction: column; }
.card:hover { transform: translateY(-3px); box-shadow: 0 14px 30px rgba(20, 17, 10, 0.08); }
.thumb { aspect-ratio: 4/3; position: relative; overflow: hidden; }
.thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s; }
.card:hover .thumb img { transform: scale(1.04); }
.tag { position: absolute; top: 12px; left: 12px; padding: 4px 10px; background: var(--bg); color: var(--ink); font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; border-radius: 999px; font-weight: 700; }
.tag.accent { background: var(--accent); color: white; }
.fav { position: absolute; top: 12px; right: 12px; width: 32px; height: 32px; border-radius: 50%; background: rgba(255, 255, 255, 0.85); border: 0; cursor: pointer; font-size: 14px; backdrop-filter: blur(6px); transition: background 0.15s; }
.fav:hover { background: white; color: var(--accent); }
.body { padding: 18px 20px; display: flex; flex-direction: column; gap: 6px; }
.title { font-weight: 800; font-size: 17px; letter-spacing: -0.01em; line-height: 1.2; }
.title em { font-family: "Newsreader", serif; font-style: italic; font-weight: 400; color: var(--accent); }
.meta { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-soft); }
.foot { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; border-top: 1px solid var(--rule); }
.price { font-weight: 800; font-size: 17px; letter-spacing: -0.01em; }
.price small { font-family: "JetBrains Mono", monospace; font-size: 10px; font-weight: 400; opacity: 0.6; margin-left: 4px; letter-spacing: 0.08em; }
.cta { padding: 8px 14px; border-radius: 999px; background: var(--ink); color: var(--bg); border: 0; font-family: inherit; font-weight: 700; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: background 0.15s; }
.cta:hover { background: var(--accent); }
.rating { font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--ink-soft); display: flex; gap: 4px; padding-top: 4px; }
.rating .stars { color: var(--accent); letter-spacing: 0.06em; }
@media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="grid">
  <article class="card"><div class="thumb"><img src="https://picsum.photos/seed/p1/600/450" alt="" /><span class="tag accent">new</span><button class="fav">♡</button></div><div class="body"><h3 class="title">Hero Series · <em>vol XV</em></h3><span class="meta">15 banners · 5 themes each</span><div class="rating"><span class="stars">★★★★★</span><span>(204)</span></div></div><div class="foot"><span class="price">$48<small>USD</small></span><button class="cta">Buy</button></div></article>
  <article class="card"><div class="thumb"><img src="https://picsum.photos/seed/p2/600/450" alt="" /><span class="tag">on sale</span><button class="fav">♡</button></div><div class="body"><h3 class="title">Block Library · <em>essentials</em></h3><span class="meta">25 components · single file</span><div class="rating"><span class="stars">★★★★★</span><span>(81)</span></div></div><div class="foot"><span class="price"><span style="text-decoration:line-through;color:var(--ink-soft);font-weight:500">$28</span> $14<small>USD</small></span><button class="cta">Buy</button></div></article>
  <article class="card"><div class="thumb"><img src="https://picsum.photos/seed/p3/600/450" alt="" /><span class="tag">limited</span><button class="fav">♡</button></div><div class="body"><h3 class="title">Studio bundle · <em>everything</em></h3><span class="meta">All blocks · all heroes · sources</span><div class="rating"><span class="stars">★★★★★</span><span>(48)</span></div></div><div class="foot"><span class="price">$98<small>USD</small></span><button class="cta">Buy</button></div></article>
</div>
</body>
</html>
