<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Error State</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;700;800&family=Newsreader:ital,opsz,wght@1,6..72,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #f4efe6; --ink: #14110a; --ink-soft: #5a554a; --accent: #c4222e; --rule: rgba(20, 17, 10, 0.16); --surface: #ffffff; }
body { background: var(--bg); color: var(--ink); font-family: "Hanken Grotesk", system-ui, sans-serif; min-height: 100svh; padding: clamp(28px, 4vw, 56px); display: grid; place-items: center; }
.card { width: min(560px, 100%); background: var(--surface); border: 1px solid var(--rule); border-left: 4px solid var(--accent); border-radius: 14px; padding: 28px; display: flex; flex-direction: column; gap: 16px; box-shadow: 0 8px 24px rgba(196, 34, 46, 0.08); }
.head { display: flex; align-items: start; gap: 14px; }
.icon { width: 38px; height: 38px; border-radius: 50%; background: rgba(196, 34, 46, 0.12); color: var(--accent); display: grid; place-items: center; font-weight: 800; font-size: 18px; flex-shrink: 0; }
.head-text { display: flex; flex-direction: column; gap: 2px; flex: 1; }
.tag { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); font-weight: 700; }
.title { font-weight: 800; font-size: 20px; letter-spacing: -0.02em; }
.title em { font-family: "Newsreader", serif; font-style: italic; font-weight: 400; color: var(--accent); }
.dek { color: var(--ink-soft); font-size: 14px; line-height: 1.55; }
.dek code { font-family: "JetBrains Mono", monospace; background: rgba(196, 34, 46, 0.08); color: var(--accent); padding: 1px 6px; border-radius: 4px; font-size: 12px; }
.details { background: rgba(20, 17, 10, 0.04); border: 1px solid var(--rule); border-radius: 8px; padding: 12px 14px; font-family: "JetBrains Mono", monospace; font-size: 11px; line-height: 1.55; color: var(--ink-soft); }
.details strong { color: var(--ink); }
.actions { display: flex; gap: 8px; flex-wrap: wrap; padding-top: 8px; border-top: 1px solid var(--rule); margin-top: 4px; }
.cta { padding: 10px 16px; border-radius: 10px; background: var(--ink); color: var(--bg); font-family: inherit; font-weight: 700; font-size: 13px; border: 0; cursor: pointer; transition: background 0.15s; }
.cta:hover { background: var(--accent); }
.cta.ghost { background: transparent; color: var(--ink); border: 1px solid var(--rule); }
.cta.ghost:hover { background: var(--ink); color: var(--bg); }
.cta.text { background: transparent; color: var(--ink-soft); border: 0; padding-inline: 8px; margin-left: auto; font-size: 12px; }
.cta.text:hover { color: var(--accent); background: transparent; }
</style>
</head>
<body>
<aside class="card">
  <div class="head">
    <span class="icon">!</span>
    <div class="head-text"><span class="tag">error · 502</span><h2 class="title">we couldn't reach the <em>server.</em></h2></div>
  </div>
  <p class="dek">This usually clears in a few seconds. If it persists, our status page is the fastest way to know more. Error code <code>SVR_BAD_GATEWAY</code>.</p>
  <div class="details"><strong>Details</strong> — request to <code style="font-family:inherit;background:transparent;color:inherit;padding:0">api.example.com/v1/dashboard</code> timed out after 8s. Trace ID <strong>trace_4b3a8f29</strong>.</div>
  <div class="actions">
    <button class="cta">Retry now →</button>
    <button class="cta ghost">View status page</button>
    <button class="cta text">contact support</button>
  </div>
</aside>
</body>
</html>
