<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mini Audio Player</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;700;800&family=Newsreader:ital,opsz,wght@1,6..72,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #f4efe6; --ink: #14110a; --ink-soft: #5a554a; --accent: #b03a1e; --rule: rgba(20, 17, 10, 0.14); --surface: #ffffff; }
body { background: var(--bg); color: var(--ink); font-family: "Hanken Grotesk", system-ui, sans-serif; min-height: 100svh; padding: 28px; display: flex; flex-direction: column; gap: 16px; max-width: 460px; margin: 0 auto; justify-content: center; }
h1 { font-weight: 800; font-size: 22px; letter-spacing: -0.02em; }
.player { background: var(--surface); border: 1px solid var(--rule); border-radius: 18px; overflow: hidden; box-shadow: 0 14px 30px rgba(20, 17, 10, 0.06); }
.player-top { padding: 18px; display: flex; gap: 14px; align-items: center; }
.art { width: 64px; height: 64px; border-radius: 12px; flex-shrink: 0; background: linear-gradient(135deg, var(--accent), #ffd03d); position: relative; overflow: hidden; }
.art::after { content: ""; position: absolute; inset: 18% 18%; border-radius: 50%; background: var(--bg); }
.art::before { content: ""; position: absolute; left: 50%; top: 50%; width: 8px; height: 8px; background: var(--ink); border-radius: 50%; transform: translate(-50%, -50%); z-index: 1; }
.meta { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.tag { font-family: "JetBrains Mono", monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); font-weight: 700; display: inline-flex; align-items: center; gap: 6px; }
.tag::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.6s infinite; }
@keyframes pulse { 50% { opacity: 0.4; } }
.title { font-weight: 700; font-size: 16px; letter-spacing: -0.01em; }
.title em { font-family: "Newsreader", serif; font-style: italic; font-weight: 400; color: var(--accent); }
.artist { font-size: 13px; color: var(--ink-soft); }
.player-controls { display: flex; align-items: center; gap: 16px; padding: 16px 18px; border-top: 1px solid var(--rule); }
.btn { width: 36px; height: 36px; border-radius: 50%; border: 0; background: transparent; cursor: pointer; display: grid; place-items: center; font-family: "JetBrains Mono", monospace; font-size: 14px; color: var(--ink); transition: background 0.15s, color 0.15s; }
.btn:hover { background: rgba(20, 17, 10, 0.06); }
.btn.play { width: 44px; height: 44px; background: var(--ink); color: var(--bg); }
.btn.play:hover { background: var(--accent); color: white; }
.progress { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.progress-bar { height: 4px; background: rgba(20, 17, 10, 0.08); border-radius: 2px; position: relative; cursor: pointer; }
.progress-fill { width: 38%; height: 100%; background: var(--accent); border-radius: 2px; position: relative; }
.progress-fill::after { content: ""; position: absolute; right: -5px; top: 50%; transform: translateY(-50%); width: 10px; height: 10px; border-radius: 50%; background: var(--accent); }
.progress-time { display: flex; justify-content: space-between; font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.06em; color: var(--ink-soft); }
.eq { display: flex; gap: 2px; align-items: end; height: 14px; padding: 0 6px; }
.eq span { width: 2px; background: var(--accent); border-radius: 1px; animation: bounce 1s ease-in-out infinite; }
.eq span:nth-child(1) { height: 60%; animation-delay: 0s; }
.eq span:nth-child(2) { height: 100%; animation-delay: 0.2s; }
.eq span:nth-child(3) { height: 50%; animation-delay: 0.4s; }
.eq span:nth-child(4) { height: 80%; animation-delay: 0.1s; }
@keyframes bounce { 50% { transform: scaleY(0.4); } }
</style>
</head>
<body>
<h1>Now playing</h1>
<div class="player">
  <div class="player-top">
    <div class="art"></div>
    <div class="meta">
      <span class="tag">live · ep 042</span>
      <span class="title">soft pixels, <em>b-side</em></span>
      <span class="artist">Lorem &amp; Ipsum · Vol IV</span>
    </div>
    <div class="eq"><span></span><span></span><span></span><span></span></div>
  </div>
  <div class="player-controls">
    <button class="btn">⏮</button>
    <button class="btn play">▶</button>
    <button class="btn">⏭</button>
    <div class="progress">
      <div class="progress-bar"><div class="progress-fill"></div></div>
      <div class="progress-time"><span>1:42</span><span>4:28</span></div>
    </div>
  </div>
</div>
</body>
</html>
