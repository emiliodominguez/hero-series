<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Team Grid</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;700;800&family=Newsreader:ital,opsz,wght@1,6..72,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #f4efe6; --ink: #14110a; --ink-soft: #5a554a; --accent: #b03a1e; --rule: rgba(20, 17, 10, 0.16); }
body { background: var(--bg); color: var(--ink); font-family: "Hanken Grotesk", system-ui, sans-serif; min-height: 100svh; padding: clamp(40px, 5vw, 80px) clamp(20px, 4vw, 56px); display: flex; flex-direction: column; gap: clamp(28px, 4vh, 40px); max-width: 1200px; margin: 0 auto; justify-content: center; }
.head { display: flex; justify-content: space-between; align-items: end; gap: 24px; flex-wrap: wrap; }
.eyebrow { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); font-weight: 700; }
.title { font-weight: 800; font-size: clamp(32px, 4vw, 48px); line-height: 1.05; letter-spacing: -0.03em; max-width: 560px; }
.title em { font-family: "Newsreader", serif; font-style: italic; font-weight: 400; color: var(--accent); }
.dek { color: var(--ink-soft); font-size: 14px; line-height: 1.55; max-width: 320px; text-align: right; align-self: end; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.member { display: flex; flex-direction: column; gap: 14px; cursor: pointer; }
.portrait { aspect-ratio: 4/5; border-radius: 14px; overflow: hidden; position: relative; background: var(--ink); }
.portrait img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; filter: grayscale(0.4) contrast(1.05); }
.member:hover img { transform: scale(1.04); filter: grayscale(0); }
.portrait::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.4)); pointer-events: none; }
.portrait-num { position: absolute; top: 12px; left: 12px; font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: white; padding: 3px 8px; background: rgba(0,0,0,0.4); border-radius: 4px; backdrop-filter: blur(6px); }
.portrait-flag { position: absolute; bottom: 10px; right: 10px; padding: 4px 8px; background: var(--accent); color: white; font-family: "JetBrains Mono", monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; border-radius: 4px; font-weight: 700; }
.info { display: flex; flex-direction: column; gap: 2px; padding: 0 4px; }
.name { font-weight: 800; font-size: 18px; letter-spacing: -0.01em; }
.role { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-soft); }
.meta { font-family: "Newsreader", serif; font-style: italic; color: var(--accent); font-size: 14px; }
@media (max-width: 800px) { .grid { grid-template-columns: 1fr 1fr; } .dek { text-align: left; } }
</style>
</head>
<body>
<header class="head">
  <div><p class="eyebrow">/ the studio · 6 humans</p><h2 class="title">small team, <em>long lunches.</em></h2></div>
  <p class="dek">Six designers, engineers, and one barista. We work async-first across two cities.</p>
</header>
<div class="grid">
  <article class="member"><div class="portrait"><img src="https://picsum.photos/seed/team1/400/500" alt="" /><span class="portrait-num">/ 01</span></div><div class="info"><span class="name">Mara Lindqvist</span><span class="role">Studio Lead</span><span class="meta">est. 2018</span></div></article>
  <article class="member"><div class="portrait"><img src="https://picsum.photos/seed/team2/400/500" alt="" /><span class="portrait-num">/ 02</span><span class="portrait-flag">new</span></div><div class="info"><span class="name">Hugo Renner</span><span class="role">Lead Engineer</span><span class="meta">est. 2025</span></div></article>
  <article class="member"><div class="portrait"><img src="https://picsum.photos/seed/team3/400/500" alt="" /><span class="portrait-num">/ 03</span></div><div class="info"><span class="name">Imani Daley</span><span class="role">Senior Designer</span><span class="meta">est. 2021</span></div></article>
  <article class="member"><div class="portrait"><img src="https://picsum.photos/seed/team4/400/500" alt="" /><span class="portrait-num">/ 04</span></div><div class="info"><span class="name">Naomi Park</span><span class="role">Brand Strategist</span><span class="meta">est. 2022</span></div></article>
</div>
</body>
</html>
