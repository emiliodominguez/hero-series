<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Login Card</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;700;800&family=Newsreader:ital,opsz,wght@1,6..72,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #f4efe6; --ink: #14110a; --ink-soft: #5a554a; --accent: #b03a1e; --rule: rgba(20, 17, 10, 0.16); --surface: #ffffff; }
body { background: var(--bg); color: var(--ink); font-family: "Hanken Grotesk", system-ui, sans-serif; min-height: 100svh; padding: clamp(28px, 4vw, 56px); display: grid; place-items: center; }
.card { width: min(420px, 100%); background: var(--surface); border: 1px solid var(--rule); border-radius: 22px; padding: clamp(28px, 4vw, 40px); display: flex; flex-direction: column; gap: 22px; }
.brand { display: inline-flex; align-items: center; gap: 8px; font-weight: 800; font-size: 16px; }
.brand-mark { color: var(--accent); font-size: 18px; }
.head { display: flex; flex-direction: column; gap: 6px; padding-bottom: 6px; }
.title { font-weight: 800; font-size: clamp(26px, 3.4vw, 32px); letter-spacing: -0.02em; line-height: 1.1; }
.title em { font-family: "Newsreader", serif; font-style: italic; font-weight: 400; color: var(--accent); }
.dek { color: var(--ink-soft); font-size: 14px; line-height: 1.55; }
.providers { display: flex; flex-direction: column; gap: 8px; }
.provider { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px 16px; border: 1px solid var(--rule); border-radius: 12px; background: transparent; font-family: inherit; font-weight: 600; font-size: 14px; cursor: pointer; transition: background 0.15s; color: inherit; text-decoration: none; }
.provider:hover { background: rgba(20, 17, 10, 0.04); }
.provider-icon { width: 18px; height: 18px; display: grid; place-items: center; font-family: "JetBrains Mono", monospace; font-weight: 700; }
.divider { display: flex; align-items: center; gap: 12px; font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-soft); }
.divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--rule); }
form { display: flex; flex-direction: column; gap: 12px; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field-label { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-soft); display: flex; justify-content: space-between; }
.field-label a { color: var(--accent); text-decoration: none; }
.field input { padding: 12px 14px; border-radius: 10px; border: 1px solid var(--rule); background: transparent; font-family: inherit; font-size: 14px; color: var(--ink); transition: border-color 0.15s; }
.field input:focus { outline: 0; border-color: var(--accent); }
.cta { padding: 14px; border-radius: 12px; background: var(--ink); color: var(--bg); border: 0; font-family: inherit; font-weight: 700; font-size: 14px; letter-spacing: 0.02em; cursor: pointer; transition: background 0.15s; margin-top: 4px; }
.cta:hover { background: var(--accent); }
.foot { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.06em; color: var(--ink-soft); text-align: center; padding-top: 8px; border-top: 1px solid var(--rule); }
.foot a { color: var(--accent); text-decoration: none; font-weight: 700; }
</style>
</head>
<body>
<div class="card">
  <span class="brand"><span class="brand-mark">◆</span>lorem<span style="color: var(--accent)">/</span>ipsum</span>
  <div class="head">
    <h1 class="title">welcome <em>back.</em></h1>
    <p class="dek">Sign in to pick up where you left off — your drafts are waiting.</p>
  </div>
  <div class="providers">
    <a class="provider" href="#"><span class="provider-icon">G</span>Continue with Google</a>
    <a class="provider" href="#"><span class="provider-icon">⌥</span>Continue with Apple</a>
  </div>
  <div class="divider">or use email</div>
  <form>
    <div class="field"><label class="field-label">Email</label><input type="email" placeholder="hello@studio.com" required /></div>
    <div class="field"><label class="field-label">Password<a href="#">forgot?</a></label><input type="password" placeholder="•••••••••" required /></div>
    <button type="submit" class="cta">Sign in →</button>
  </form>
  <p class="foot">No account yet? <a href="#">Make one — free</a></p>
</div>
</body>
</html>
