<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#f1ece0" />
		<title>Hero 12 - Quiet Hours</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400;1,8..60,500&family=Inter:wght@400;500&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<main class="calm">
			<header class="calm-nav">
				<a class="calm-mark" href="#">
					<span class="calm-mark-dot" aria-hidden="true"></span>
					<span>lorem<span class="calm-mark-slash">/</span>ipsum</span>
				</a>
				<div class="calm-themes" role="group" aria-label="Theme">
					<button class="calm-theme calm-theme-bone is-active" type="button" data-theme="bone" aria-label="Bone"></button>
					<button class="calm-theme calm-theme-fog" type="button" data-theme="fog" aria-label="Fog"></button>
					<button class="calm-theme calm-theme-stone" type="button" data-theme="stone" aria-label="Stone"></button>
					<button class="calm-theme calm-theme-slate" type="button" data-theme="slate" aria-label="Slate"></button>
					<button class="calm-theme calm-theme-dusk" type="button" data-theme="dusk" aria-label="Dusk"></button>
					<button class="calm-theme calm-theme-noir" type="button" data-theme="noir" aria-label="Noir"></button>
					<button class="calm-theme calm-theme-midnight" type="button" data-theme="midnight" aria-label="Midnight"></button>
					<button class="calm-theme calm-theme-moss" type="button" data-theme="moss" aria-label="Moss"></button>
				</div>
			</header>

			<section class="calm-stage">
				<p class="calm-eyebrow">
					<span class="calm-eyebrow-num">XII</span>
					<span class="calm-eyebrow-rule" aria-hidden="true"></span>
					<span>An archive of small things</span>
				</p>

				<h1 class="calm-title">
					<span class="calm-title-line">quiet</span>
					<span class="calm-title-line calm-title-line-b"><em>hours<span class="calm-title-dot">.</span></em></span>
				</h1>

				<p class="calm-dek">
					Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor
					incididunt — small notes on quieter ways of working.
				</p>

				<a class="calm-cta" href="#">
					<span>read entries</span>
					<span class="calm-cta-arrow" aria-hidden="true">→</span>
				</a>
			</section>

			<footer class="calm-foot">
				<span class="calm-foot-meta">
					<span class="calm-foot-pulse" aria-hidden="true"></span>
					Updated weekly
				</span>
				<span class="calm-foot-rule" aria-hidden="true"></span>
				<span>vol XII · entry 042</span>
				<span class="calm-foot-rule" aria-hidden="true"></span>
				<span>set in source serif</span>
			</footer>
		</main>
		<script src="script.js" defer></script>
	</body>
</html>
